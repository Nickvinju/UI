<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindAR Test</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: assets/targets.mind;"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
embedded
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights">

<a-assets>
<a-asset-item id="punkModel" src="assets/punk.glb"></a-asset-item>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-entity
id="punk"
gltf-model="#punkModel"
position="0 -0.4 0"
rotation="0 180 0"
scale="0.25 0.25 0.25"
animation-mixer="clip: CharacterArmature|Wave; loop: repeat">
</a-entity>

</a-entity>

<a-light type="ambient" intensity="1"></a-light>
<a-light type="directional" position="1 2 1"></a-light>

</a-scene>

</body>
</html>
