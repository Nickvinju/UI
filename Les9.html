<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>MindAR Punk Test</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    canvas {
      width: 100vw !important;
      height: 100vh !important;
    }

    #startButton {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      background: white;
      color: black;
    }

    #msg {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <button id="startButton">Start AR</button>
  <div id="msg">Point at your target image</div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false;"
    embedded
    color-space="sRGB"
    renderer="alpha: true; colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-assets>
      <a-asset-item id="punkModel" src="./assets/punk.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        id="punk"
        gltf-model="#punkModel"
        position="0 -0.4 0"
        rotation="0 180 0"
        scale="0.25 0.25 0.25">
      </a-entity>
    </a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" intensity="1" position="1 2 1"></a-light>
  </a-scene>

  <script>
    const sceneEl = document.querySelector("a-scene");
    const startButton = document.querySelector("#startButton");
    const msg = document.querySelector("#msg");
    const punk = document.querySelector("#punk");
    const target = document.querySelector("[mindar-image-target]");

    punk.addEventListener("model-loaded", () => {
      punk.setAttribute("animation-mixer", {
        clip: "CharacterArmature|Wave",
        loop: "repeat"
      });
    });

    target.addEventListener("targetFound", () => {
      msg.textContent = "Target found";
    });

    target.addEventListener("targetLost", () => {
      msg.textContent = "Target lost";
    });

    sceneEl.addEventListener("loaded", () => {
      startButton.addEventListener("click", async () => {
        try {
          await sceneEl.systems["mindar-image-system"].start();
          startButton.style.display = "none";
          msg.textContent = "Camera started - point at your target image";
        } catch (err) {
          console.error(err);
          msg.textContent = "Could not start camera";
        }
      });
    });
  </script>
</body>
</html>
