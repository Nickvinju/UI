<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>A-Frame AR Hit Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <!-- A-Frame extras voor animation-mixer -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 10;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="info">Start AR en tik op de vloer of tafel om de punk te plaatsen.</div>

  <a-scene
    webxr="optionalFeatures: hit-test;"
    ar-hit-test="target: #punk;"
    xr-mode-ui="XRMode: ar"
    renderer="colorManagement: true; physicallyCorrectLights: true"
  >
    <a-assets>
      <a-asset-item id="punkModel" src="assets/punk.glb"></a-asset-item>
    </a-assets>

    <a-entity
      id="punk"
      gltf-model="#punkModel"
      rotation="0 180 0"
      scale="0.3 0.3 0.3"
      visible="false">
    </a-entity>

    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 1" intensity="1"></a-light>

    <a-camera></a-camera>
  </a-scene>

  <script>
    const punk = document.querySelector('#punk');
    const scene = document.querySelector('a-scene');

    punk.addEventListener('model-loaded', function () {
      punk.setAttribute('animation-mixer', {
        clip: 'CharacterArmature|Wave',
        loop: 'repeat'
      });
    });

    scene.addEventListener('ar-hit-test-select', function (event) {
      console.log('Model geplaatst', event.detail);
    });
  </script>
</body>
</html>
