<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .example-container, a-scene {
      overflow: hidden;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;            /* modern */
      height: var(--app-height); /* fallback */
    }

    .options-panel {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 3;
      padding: 6px;
    }

    .options-panel img {
      border: solid 2px;
      width: 50px;
      height: 50px;
      object-fit: cover;
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      margin: 2px;
    }

    .options-panel img.selected {
      border-color: green;
    }

    /* Start overlay */
    .start-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
    }

    .start-btn {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 18px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
    }

    .hint {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 12px;
      z-index: 11;
      text-align: center;
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 13px;
      opacity: 0.9;
      pointer-events: none;
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const list = ["glasses1", "glasses2", "hat1", "hat2", "earring"];
      const visibles = [true, false, false, true, true];

      const setVisible = (button, entities, visible) => {
        if (!button) return;
        button.classList.toggle("selected", visible);
        entities.forEach((entity) => entity.setAttribute("visible", visible));
      };

      list.forEach((item, index) => {
        const button = document.querySelector("#" + item);
        const entities = document.querySelectorAll("." + item + "-entity");
        setVisible(button, entities, visibles[index]);

        if (button) {
          button.addEventListener("click", () => {
            visibles[index] = !visibles[index];
            setVisible(button, entities, visibles[index]);
          });
        }
      });

      const isMobile = AFRAME.utils.device.isMobile();
      const sceneEl = document.querySelector("a-scene");
      const containerEl = document.querySelector(".example-container");
      const overlayEl = document.querySelector(".start-overlay");
      const startBtn = document.querySelector("#startAR");

      let arSystem = null;
      let arStarted = false;

      function applyViewportSize() {
        const vv = window.visualViewport;
        const w = vv ? vv.width : window.innerWidth;
        const h = vv ? vv.height : window.innerHeight;

        document.documentElement.style.setProperty("--app-height", `${h}px`);

        if (containerEl) {
          containerEl.style.width = `${w}px`;
          containerEl.style.height = `${h}px`;
        }
        if (sceneEl) {
          sceneEl.style.width = `${w}px`;
          sceneEl.style.height = `${h}px`;
        }

        if (sceneEl && sceneEl.renderer && containerEl) {
          const cw = containerEl.clientWidth;
          const ch = containerEl.clientHeight;
          sceneEl.renderer.setPixelRatio(window.devicePixelRatio || 1);
          sceneEl.renderer.setSize(cw, ch, false);
        }
      }

      function safeStartAR() {
        if (!arSystem || arStarted) return;
        applyViewportSize();

        // Start must happen from user gesture on many mobiles.
        try {
          arSystem.start();
          arStarted = true;
          if (overlayEl) overlayEl.style.display = "none";
        } catch (e) {
          console.warn("MindAR start failed:", e);
          // Keep overlay visible so user can try again
        }
      }

      function restartAR() {
        if (!arSystem || !arStarted) return; // only restart after it actually started
        try { arSystem.stop(); } catch (e) {}
        applyViewportSize();
        setTimeout(() => {
          try { arSystem.start(); } catch (e) {}
        }, 150);
      }

      // Once A-Frame is ready, grab MindAR system
      sceneEl.addEventListener("loaded", () => {
        arSystem = sceneEl.systems["mindar-face-system"];
        applyViewportSize();
      });

      // Button starts AR (user gesture)
      startBtn.addEventListener("click", safeStartAR);
      startBtn.addEventListener("touchend", (e) => {
        e.preventDefault();
        safeStartAR();
      }, { passive: false });

      // Resize handling (only restart after started)
      if (isMobile) {
        let t;
        const onResize = () => {
          clearTimeout(t);
          t = setTimeout(restartAR, 200);
        };

        window.addEventListener("resize", onResize);
        window.addEventListener("orientationchange", onResize);

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", onResize);
          window.visualViewport.addEventListener("scroll", onResize);
        }
      } else {
        // desktop: still keep canvas aligned
        window.addEventListener("resize", applyViewportSize);
      }

      // initial sizing
      applyViewportSize();
    });
  </script>
</head>

<body>
  <div class="example-container">

    <!-- Start overlay (required for many mobile browsers) -->
    <div class="start-overlay">
      <button class="start-btn" id="startAR">Start AR</button>
      <div class="hint">Tap to allow camera access</div>
    </div>

    <div class="options-panel">
      <img id="hat1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/thumbnail.png"/>
      <img id="hat2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/thumbnail.png"/>
      <img id="glasses1" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/thumbnail.png"/>
      <img id="glasses2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/thumbnail.png"/>
      <img id="earring" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/thumbnail.png"/>
    </div>

    <a-scene
      mindar-face="autoStart: false"
      embedded
      background="transparent: true"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
        <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        <a-asset-item id="glassesModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/glasses2/scene.gltf"></a-asset-item>
        <a-asset-item id="hatModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat/scene.gltf"></a-asset-item>
        <a-asset-item id="hatModel2" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/hat2/scene.gltf"></a-asset-item>
        <a-asset-item id="earringModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/earring/scene.gltf"></a-asset-item>
      </a-assets>

      <!-- MindAR manages camera feed; keep A-Frame camera inactive -->
      <a-camera active="false" position="0 0 0"></a-camera>

      <!-- Head occluder -->
      <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model
          mindar-face-occluder
          position="0 -0.3 0.15"
          rotation="0 0 0"
          scale="0.065 0.065 0.065"
          src="#headModel">
        </a-gltf-model>
      </a-entity>

      <!-- Hat 1 -->
      <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model
          position="0 1.0 -0.5"
          scale="0.35 0.35 0.35"
          src="#hatModel"
          class="hat1-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

      <!-- Hat 2 -->
      <a-entity mindar-face-target="anchorIndex: 10">
        <a-gltf-model
          position="0 -0.2 -0.5"
          scale="0.008 0.008 0.008"
          src="#hatModel2"
          class="hat2-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

      <!-- Glasses 1 -->
      <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model
          position="0 0 0"
          scale="0.01 0.01 0.01"
          src="#glassesModel"
          class="glasses1-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

      <!-- Glasses 2 -->
      <a-entity mindar-face-target="anchorIndex: 168">
        <a-gltf-model
          rotation="0 -90 0"
          position="0 -0.3 0"
          scale="0.6 0.6 0.6"
          src="#glassesModel2"
          class="glasses2-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

      <!-- Earrings -->
      <a-entity mindar-face-target="anchorIndex: 127">
        <a-gltf-model
          rotation="-0.1 0 0"
          position="0 -0.3 -0.3"
          scale="0.05 0.05 0.05"
          src="#earringModel"
          class="earring-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

      <a-entity mindar-face-target="anchorIndex: 356">
        <a-gltf-model
          rotation="0.1 0 0"
          position="0 -0.3 -0.3"
          scale="0.05 0.05 0.05"
          src="#earringModel"
          class="earring-entity"
          visible="false">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </div>
</body>
</html>
