<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebXR AR + Hammer.js Pinch</title>

<style>
* {
    margin: 0;
    padding: 0;
}

html, body {
    overflow: hidden;
    height: 100%;
}

.webgl {
    position: fixed;
    top: 0;
    left: 0;
    outline: none;
}
</style>
</head>

<body>
<canvas class="webgl"></canvas>

<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';

const canvas = document.querySelector('.webgl')
const scene = new THREE.Scene()

// Licht
const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
light.position.set(0.5, 1, 0.25);
scene.add(light);

// Sizes
const sizes = {
  width: window.innerWidth,
  height: window.innerHeight
}

// Camera
const camera = new THREE.PerspectiveCamera(75, sizes.width / sizes.height, 0.01, 100)
scene.add(camera)

// Renderer
const renderer = new THREE.WebGLRenderer({
  canvas: canvas,
  antialias: true,
  alpha: true
})

renderer.setSize(sizes.width, sizes.height)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
renderer.xr.enabled = true

document.body.appendChild(
  ARButton.createButton(renderer, { requiredFeatures: [] })
)

// Resize
window.addEventListener('resize', () => {
  sizes.width = window.innerWidth
  sizes.height = window.innerHeight
  camera.aspect = sizes.width / sizes.height
  camera.updateProjectionMatrix()
  renderer.setSize(sizes.width, sizes.height)
})

// Geometry
let radius = 0.1

const geometry = new THREE.IcosahedronGeometry(radius, 1)
const material = new THREE.MeshPhongMaterial({
  color: new THREE.Color("rgb(226,35,213)"),
  shininess: 6,
  flatShading: true,
  transparent: true,
  opacity: 0.8
})

const mesh = new THREE.Mesh(geometry, material)
mesh.position.set(0, 0, -0.5)
scene.add(mesh)

// ----------- HAMMER TOUCH -----------

const hammertime = new Hammer(document.body)
hammertime.get('pinch').set({ enable: true })

hammertime.on("pinch", ev => {
  scaleMesh(ev.scale)
})

function scaleMesh(amount) {
  const scaleAmount = clipValue(amount, 0.1, 2)
  mesh.scale.set(scaleAmount, scaleAmount, scaleAmount)
}

function clipValue(val, min, max) {
  return val < min ? min : val > max ? max : val
}

// Animation loop
const clock = new THREE.Clock()

renderer.setAnimationLoop(() => {
  renderer.render(scene, camera)
})

</script>
</body>
</html>
